# 1. Interface (apenas na interna)
interface=docker0
bind-interfaces

# 2. IPv4
dhcp-range=10.0.0.2,10.255.255.254,255.0.0.0,12h
dhcp-option=3,10.0.0.1
dhcp-option=6,1.1.1.1,8.8.8.8

# 3. IPv6 (Range stateful para o /80)
dhcp-range=2804:14d:7e89:41a0:1234::2,2804:14d:7e89:41a0:1234:ffff:ffff:ffff,80,12h

# 4. Anúncio de Rota (RA)
enable-ra

# 5. DNS IPv6
dhcp-option=option6:dns-server,[2606:4700:4700::1111],[2001:4860:4860::8888]
